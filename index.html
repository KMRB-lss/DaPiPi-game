<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>打屁屁 - 发泄解压计数器</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      user-select: none;
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ffecd2 100%);
      transition: background 0.5s ease;
    }
    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    h1 {
      text-align: center;
      padding: 20px;
      font-size: 2rem;
      color: #c44569;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
    }
    .peach {
      position: absolute;
      width: 120px;
      height: 140px;
      cursor: pointer;
      transition: transform 0.1s ease;
      z-index: 10;
    }
    .peach:hover {
      transform: scale(1.05);
    }
    .peach:active {
      transform: scale(0.95);
    }
    .peach-emoji {
      font-size: 120px;
      text-align: center;
      line-height: 140px;
    }
    .peach-face {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .peach-face.visible {
      opacity: 1;
    }
    .hit-effect {
      position: absolute;
      font-size: 32px;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      z-index: 20;
    }
    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-80px) scale(1.5);
      }
    }
    .stats {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      padding: 15px 30px;
      border-radius: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      gap: 30px;
      z-index: 100;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #c44569;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #666;
    }
    .buttons {
      position: fixed;
      bottom: 100px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
    }
    button {
      padding: 10px 20px;
      font-size: 1rem;
      border: none;
      border-radius: 20px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 2px 10px rgba(255,107,107,0.3);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255,107,107,0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .combo-display {
      position: fixed;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 3rem;
      font-weight: bold;
      color: #ff6b6b;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 90;
    }
    .combo-display.visible {
      opacity: 1;
    }
    .dodge-hint {
      font-size: 1.1rem;
      color: #885533;
      position: fixed;
      z-index: 90;
      pointer-events: none;
      transition: opacity 0.2s, left 0.12s ease, top 0.12s ease;
    }
    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🍑 打屁屁发泄室 🍑</h1>
    
    <div class="peach" id="peach">
      <div class="peach-emoji">🍑</div>
      <div class="peach-face" id="peachFace">😀</div>
    </div>
    
    <div class="combo-display" id="comboDisplay">x1</div>
    
    <div class="dodge-hint" id="dodgeHint">😈 追桃挑战模式!</div>
    
    <div class="stats" id="stats">
      <div class="stat-item">
        <div class="stat-value" id="hitCount">0</div>
        <div class="stat-label">击打次数</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="comboCount">0</div>
        <div class="stat-label">最高连击</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="totalHits">0</div>
        <div class="stat-label">累计击打</div>
      </div>
    </div>
    
    <div class="buttons" id="buttons">
      <button id="resetBtn">重置计数</button>
      <button id="autoBtn">自动击打</button>
      <button id="dodgeBtn">追桃挑战</button>
    </div>
  </div>

  <script>
    // 游戏状态
    let hitCount = 0;
    let combo = 0;
    let maxCombo = 0;
    let totalHits = 0;
    let isAutoMode = false;
    let isDodgeMode = false;
    let dodgeDelay = 2000;
    let comboTimeoutId = null;
    let autoHitInterval = null;
    let ctx = null;
    
    const COMBO_TIMEOUT = 2000;
    const PEACH_WIDTH = 120;
    const PEACH_HEIGHT = 140;
    
    // DOM元素
    const peach = document.getElementById('peach');
    const peachFace = document.getElementById('peachFace');
    const hitCountEl = document.getElementById('hitCount');
    const comboCountEl = document.getElementById('comboCount');
    const totalHitsEl = document.getElementById('totalHits');
    const comboDisplay = document.getElementById('comboDisplay');
    const dodgeHint = document.getElementById('dodgeHint');
    const buttons = document.getElementById('buttons');
    const resetBtn = document.getElementById('resetBtn');
    const autoBtn = document.getElementById('autoBtn');
    const dodgeBtn = document.getElementById('dodgeBtn');
    
    // 表情列表
    const faces = ['😀', '😊', '😌', '😲', '😰', '😢', '😭', '😵'];
    
    // 初始化
    function init() {
      // 加载保存的数据
      loadStats();
      
      // 设置初始位置
      resetPeachPosition();
      
      // 添加事件监听
      peach.addEventListener('click', handleHit);
      resetBtn.addEventListener('click', resetStats);
      autoBtn.addEventListener('click', toggleAutoMode);
      dodgeBtn.addEventListener('click', toggleDodgeMode);
      
      // 鼠标追踪（用于躲避模式）
      document.addEventListener('mousemove', handleMouseMove);
      
      // 更新背景颜色
      updateBackground();
    }
    
    // 确保音频上下文
    function ensureCtx() {
      if (!ctx) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (ctx.state === 'suspended') {
        ctx.resume();
      }
      return ctx;
    }
    
    // 播放击打声音
    function playHitSound() {
      try {
        const audioCtx = ensureCtx();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.setValueAtTime(200 + Math.random() * 200, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
        
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.1);
      } catch (e) {
        console.log('声音播放失败:', e);
      }
    }
    
    // 震动反馈
    function vibrate() {
      if ('vibrate' in navigator) {
        navigator.vibrate(50);
      }
    }
    
    // 处理击打
    function handleHit(e) {
      e.preventDefault();
      
      hitCount++;
      totalHits++;
      combo++;
      
      if (combo > maxCombo) {
        maxCombo = combo;
      }
      
      // 更新显示
      updateStats();
      updateComboDisplay();
      updateBackground();
      
      // 播放声音和震动
      playHitSound();
      vibrate();
      
      // 显示击打效果
      showHitEffect(e.clientX, e.clientY);
      
      // 更新表情
      updateFace();
      
      // 设置连击超时
      updateCombo();
      
      // 减少躲避延迟
      if (isDodgeMode && hitCount % 10 === 0) {
        dodgeDelay = Math.max(300, dodgeDelay - 100);
      }
    }
    
    // 更新连击显示
    function updateComboDisplay() {
      if (combo > 1) {
        comboDisplay.textContent = `x${combo}`;
        comboDisplay.classList.add('visible');
        
        setTimeout(() => {
          comboDisplay.classList.remove('visible');
        }, 500);
      }
    }
    
    // 设置连击超时
    function updateCombo() {
      if (comboTimeoutId) clearTimeout(comboTimeoutId);
      comboTimeoutId = setTimeout(() => {
        comboBreak();
      }, COMBO_TIMEOUT);
    }
    
    // 连击中断
    function comboBreak() {
      combo = 0;
      buttons.style.opacity = '1';
      buttons.style.pointerEvents = 'auto';
    }
    
    // 显示击打效果
    function showHitEffect(x, y) {
      const effect = document.createElement('div');
      effect.className = 'hit-effect';
      effect.textContent = ['💥', '👊', '🔥', '💢'][Math.floor(Math.random() * 4)];
      effect.style.left = x + 'px';
      effect.style.top = y + 'px';
      document.body.appendChild(effect);
      
      setTimeout(() => {
        effect.remove();
      }, 800);
    }
    
    // 更新表情
    function updateFace() {
      const faceIndex = Math.min(Math.floor(hitCount / 10), faces.length - 1);
      peachFace.textContent = faces[faceIndex];
      peachFace.classList.add('visible');
      
      // 表情短暂显示后消失
      setTimeout(() => {
        peachFace.classList.remove('visible');
      }, 500);
    }
    
    // 更新背景颜色（红温效果）
    function updateBackground() {
      const intensity = Math.min(hitCount / 100, 1);
      const r = Math.floor(255 * (0.95 + intensity * 0.05));
      const g = Math.floor(200 * (1 - intensity * 0.3));
      const b = Math.floor(200 * (1 - intensity * 0.3));
      
      document.body.style.background = `linear-gradient(135deg, rgb(${r},${g},${b}) 0%, rgb(${r},${Math.floor(g*0.8)},${Math.floor(b*0.8)}) 50%, rgb(${r},${g},${b}) 100%)`;
    }
    
    // 更新统计显示
    function updateStats() {
      hitCountEl.textContent = hitCount;
      comboCountEl.textContent = maxCombo;
      totalHitsEl.textContent = totalHits;
    }
    
    // 保存数据
    function saveStats() {
      localStorage.setItem('peachGame', JSON.stringify({
        hitCount,
        maxCombo,
        totalHits
      }));
    }
    
    // 加载数据
    function loadStats() {
      const saved = localStorage.getItem('peachGame');
      if (saved) {
        const data = JSON.parse(saved);
        hitCount = data.hitCount || 0;
        maxCombo = data.maxCombo || 0;
        totalHits = data.totalHits || 0;
        updateStats();
      }
    }
    
    // 重置统计
    function resetStats() {
      hitCount = 0;
      combo = 0;
      updateStats();
      updateBackground();
      saveStats();
      // 按钮不重置
    }
    
    // 重置桃子位置
    function resetPeachPosition() {
      const maxX = window.innerWidth - PEACH_WIDTH;
      const maxY = window.innerHeight - PEACH_HEIGHT - 150; // 避开底部统计栏
      
      peach.style.left = Math.random() * maxX + 'px';
      peach.style.top = Math.random() * maxY + 'px';
    }
    
    // 切换自动模式
    function toggleAutoMode() {
      isAutoMode = !isAutoMode;
      
      if (isAutoMode) {
        autoBtn.textContent = '停止自动';
        doAutoHits();
      } else {
        autoBtn.textContent = '自动击打';
        if (autoHitInterval) {
          clearInterval(autoHitInterval);
          autoHitInterval = null;
        }
      }
    }
    
    // 自动击打
    function doAutoHits() {
      autoHitInterval = setInterval(() => {
        const rect = peach.getBoundingClientRect();
        const event = new MouseEvent('click', {
          clientX: rect.left + rect.width / 2,
          clientY: rect.top + rect.height / 2
        });
        peach.dispatchEvent(event);
      }, 100);
    }
    
    // 切换躲避模式
    function toggleDodgeMode() {
      isDodgeMode = !isDodgeMode;
      dodgeDelay = 2000;
      
      if (isDodgeMode) {
        dodgeBtn.textContent = '关闭追桃';
        dodgeHint.classList.remove('hidden');
      } else {
        dodgeBtn.textContent = '追桃挑战';
        dodgeHint.classList.add('hidden');
      }
    }
    
    // 处理鼠标移动
    let lastDodgeTime = 0;
    function handleMouseMove(e) {
      if (!isDodgeMode) return;
      
      const now = Date.now();
      if (now - lastDodgeTime < dodgeDelay) return;
      
      const peachRect = peach.getBoundingClientRect();
      const peachCenterX = peachRect.left + peachRect.width / 2;
      const peachCenterY = peachRect.top + peachRect.height / 2;
      
      const distance = Math.sqrt(
        Math.pow(e.clientX - peachCenterX, 2) +
        Math.pow(e.clientY - peachCenterY, 2)
      );
      
      // 鼠标靠近时躲避
      if (distance < 200) {
        dodgePeach(e.clientX, e.clientY);
        lastDodgeTime = now;
      }
    }
    
    // 桃子躲避
    function dodgePeach(mouseX, mouseY) {
      const peachRect = peach.getBoundingClientRect();
      const peachCenterX = peachRect.left + peachRect.width / 2;
      const peachCenterY = peachRect.top + peachRect.height / 2;
      
      // 计算躲避方向（远离鼠标）
      const dx = peachCenterX - mouseX;
      const dy = peachCenterY - mouseY;
      const distance = Math.sqrt(dx * dx + dy * dy);
      
      // 归一化方向向量
      const nx = dx / distance;
      const ny = dy / distance;
      
      // 计算新位置
      const moveDistance = 150 + Math.random() * 100;
      let newX = peachCenterX + nx * moveDistance - PEACH_WIDTH / 2;
      let newY = peachCenterY + ny * moveDistance - PEACH_HEIGHT / 2;
      
      // 限制在页面范围内
      const maxX = window.innerWidth - PEACH_WIDTH;
      const maxY = window.innerHeight - PEACH_HEIGHT - 150;
      
      newX = Math.max(0, Math.min(newX, maxX));
      newY = Math.max(0, Math.min(newY, maxY));
      
      // 更新位置
      peach.style.left = newX + 'px';
      peach.style.top = newY + 'px';
      
      // 更新提示位置
      updateDodgeHint(newX + PEACH_WIDTH / 2, newY - 30);
    }
    
    // 更新提示位置
    function updateDodgeHint(x, y) {
      dodgeHint.style.left = x + 'px';
      dodgeHint.style.top = y + 'px';
    }
    
    // 窗口大小改变时重新计算
    window.addEventListener('resize', () => {
      const rect = peach.getBoundingClientRect();
      const maxX = window.innerWidth - PEACH_WIDTH;
      const maxY = window.innerHeight - PEACH_HEIGHT - 150;
      
      peach.style.left = Math.min(rect.left, maxX) + 'px';
      peach.style.top = Math.min(rect.top, maxY) + 'px';
    });
    
    // 页面关闭前保存数据
    window.addEventListener('beforeunload', saveStats);
    
    // 启动游戏
    init();
  </script>
</body>
</html>
